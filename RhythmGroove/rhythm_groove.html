<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rhythm Groove</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Press Start 2P', monospace;
      background: #05001a;
      min-height: 100vh;
      overflow-x: hidden;
    }

    #tela-inicio {
      position: relative;
      width: 100%;
      min-height: 100vh;
      background: linear-gradient(180deg, #050015 0%, #120030 60%, #0d0025 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    #tela-inicio::after {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 10;
      background: repeating-linear-gradient(0deg, rgba(0,0,0,0.12) 0px, rgba(0,0,0,0.12) 1px, transparent 1px, transparent 3px);
    }

    #tela-inicio::before {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 9;
      background: radial-gradient(ellipse at 50% 50%, transparent 50%, rgba(0,0,0,0.75) 100%);
    }

    .grade-fundo {
      position: absolute;
      inset: 0;
      z-index: 0;
      background-image: linear-gradient(rgba(160,0,255,0.10) 1px, transparent 1px), linear-gradient(90deg, rgba(160,0,255,0.10) 1px, transparent 1px);
      background-size: 50px 50px;
    }

    .grade-chao {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 200px;
      z-index: 1;
      background: repeating-linear-gradient(to bottom, rgba(200,0,255,0.28) 0px, rgba(200,0,255,0.28) 1px, transparent 1px, transparent 30px);
      transform: perspective(300px) rotateX(40deg);
      transform-origin: bottom center;
    }

    .estrelas { position: absolute; inset: 0; z-index: 1; }

    .estrela {
      position: absolute;
      width: 2px;
      height: 2px;
      background: white;
      border-radius: 50%;
      animation: pisca linear infinite;
    }

    @keyframes pisca {
      0%, 100% { opacity: 0.2; }
      50% { opacity: 1; }
    }

    .montanhas {
      position: absolute;
      bottom: 120px;
      left: 0;
      right: 0;
      z-index: 2;
      height: 80px;
      overflow: hidden;
    }

    .montanhas svg { width: 100%; height: 100%; }

    .cidade {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 3;
      height: 120px;
      display: flex;
      align-items: flex-end;
      gap: 2px;
      padding: 0 4px;
    }

    .predio { flex-shrink: 0; position: relative; }
    .predio:nth-child(odd) { background: #1a0035; }
    .predio:nth-child(even) { background: #220040; }
    .predio::before {
      content: '';
      position: absolute;
      inset: 4px 2px;
      background-image: radial-gradient(circle, rgba(180,100,255,0.4) 1px, transparent 1px);
      background-size: 5px 5px;
    }

    .setas-container {
      position: absolute;
      inset: 0;
      z-index: 2;
      overflow: hidden;
      pointer-events: none;
    }

    .seta-caindo {
      position: absolute;
      top: -60px;
      animation: cair linear infinite;
    }

    @keyframes cair {
      0% { transform: translateY(0); }
      100% { transform: translateY(110vh); }
    }

    .tela-neon {
      position: relative;
      z-index: 5;
      width: 90%;
      max-width: 900px;
      border: 4px solid #bb44ff;
      box-shadow: 0 0 20px #9900ff, 0 0 50px rgba(150,0,255,0.4), inset 0 0 30px rgba(80,0,150,0.3);
      background: rgba(5,0,26,0.85);
      padding: 50px 40px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
      margin: 40px 0;
    }

    .tela-neon::before {
      content: '';
      position: absolute;
      inset: 6px;
      border: 2px solid #6622aa;
      pointer-events: none;
    }

    .titulo { text-align: center; line-height: 1.3; }

    .titulo-linha1 {
      display: block;
      font-size: clamp(28px, 6vw, 56px);
      color: #ffaaff;
      text-shadow: 4px 4px 0 #770088, 3px 3px 0 #880099, 2px 2px 0 #9900aa, 1px 1px 0 #aa00bb, 0 0 20px #ff00ff, 0 0 40px #cc00cc;
      animation: brilho-titulo 2s ease-in-out infinite;
    }

    .titulo-linha2 {
      display: block;
      font-size: clamp(28px, 6vw, 56px);
      color: #ff66ff;
      text-shadow: 4px 4px 0 #550066, 3px 3px 0 #660077, 2px 2px 0 #770088, 1px 1px 0 #880099, 0 0 18px #cc00ff, 0 0 35px #9900cc;
      animation: brilho-titulo 2s ease-in-out infinite 0.3s;
    }

    @keyframes brilho-titulo {
      0%, 100% { filter: brightness(1); }
      50% { filter: brightness(1.3) drop-shadow(0 0 12px #ff00ff); }
    }

    .menu {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
    }

    .menu-item {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(9px, 2vw, 14px);
      color: #cc88ff;
      text-shadow: 2px 2px 0 #330044;
      cursor: pointer;
      letter-spacing: 2px;
      transition: color 0.1s, text-shadow 0.1s;
      user-select: none;
    }

    .menu-item:hover { color: #ffccff; text-shadow: 2px 2px 0 #660066, 0 0 10px #ff00ff; }

    #tela-songs {
      display: none;
      width: 100%;
      min-height: 100vh;
      background: rgba(2,0,12,0.97);
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 20px;
      overflow-y: auto;
    }

    #tela-songs.ativa { display: flex; }

    .songs-titulo {
      font-size: clamp(11px, 3vw, 16px);
      color: #ff88ff;
      text-shadow: 3px 3px 0 #660066, 0 0 16px #ff00ff;
      margin-bottom: 6px;
      text-align: center;
      animation: brilho-titulo 2s ease-in-out infinite;
    }


    .musicas-lista {
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 100%;
      max-width: 540px;
    }

    .musica-card {
      background: linear-gradient(90deg, rgba(55,0,90,0.7), rgba(35,0,70,0.5));
      border: 2px solid #7722bb;
      padding: 11px 14px;
      cursor: pointer;
      clip-path: polygon(8px 0%, calc(100% - 8px) 0%, 100% 8px, 100% calc(100% - 8px), calc(100% - 8px) 100%, 8px 100%, 0% calc(100% - 8px), 0% 8px);
      transition: all 0.15s;
      position: relative;
    }

    .musica-card::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 4px;
      background: linear-gradient(180deg, #ff44ff, #8800cc);
    }

    .musica-card:hover { border-color: #ff44ff; transform: translateX(5px); box-shadow: 0 0 14px #cc00ff; }
    .musica-card.selecionada { border-color: #ffaaff; transform: translateX(8px); box-shadow: 0 0 22px #ff44ff; }

    .musica-linha1 { display: flex; align-items: center; gap: 8px; }

    .musica-seta { font-size: 18px; font-weight: bold; width: 22px; text-align: center; }
    .musica-seta.cima { color: #4488ff; text-shadow: 0 0 6px #4488ff; }
    .musica-seta.dir { color: #44ff88; text-shadow: 0 0 6px #44ff88; }
    .musica-seta.baixo { color: #ff4444; text-shadow: 0 0 6px #ff4444; }
    .musica-seta.esq { color: #ffff44; text-shadow: 0 0 6px #ffff44; }

    .musica-nome {
      font-size: clamp(6px, 1.5vw, 8px);
      color: #ffccff;
      text-shadow: 0 0 5px #ff44ff;
      flex: 1;
      line-height: 1.5;
    }

    .btn-play {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(5px, 1.2vw, 7px);
      padding: 5px 10px;
      background: linear-gradient(180deg, #cc0066, #880044);
      color: #ffccff;
      border: 1px solid #ff44aa;
      cursor: pointer;
      clip-path: polygon(3px 0%, calc(100% - 3px) 0%, 100% 3px, 100% calc(100% - 3px), calc(100% - 3px) 100%, 3px 100%, 0% calc(100% - 3px), 0% 3px);
      transition: all 0.15s;
      box-shadow: 0 0 5px #ff0066;
    }

    .btn-play:hover { background: linear-gradient(180deg, #ff0088, #cc0055); box-shadow: 0 0 12px #ff44ff; transform: scale(1.07); }

    .coracao { font-size: 14px; color: #ff44aa; animation: batimento 1.1s ease-in-out infinite; }

    @keyframes batimento {
      0%, 100% { transform: scale(1); }
      40% { transform: scale(1.4); }
      60% { transform: scale(0.88); }
    }

    .btn-voltar {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(6px, 1.5vw, 8px);
      padding: 10px 20px;
      background: transparent;
      color: #cc66ff;
      border: 2px solid #7722aa;
      cursor: pointer;
      clip-path: polygon(5px 0%, calc(100% - 5px) 0%, 100% 5px, 100% calc(100% - 5px), calc(100% - 5px) 100%, 5px 100%, 0% calc(100% - 5px), 0% 5px);
      transition: all 0.15s;
      margin-top: 14px;
      letter-spacing: 1px;
      box-shadow: 0 0 5px #660099;
    }

    .btn-voltar:hover { border-color: #ff44ff; color: #ffaaff; box-shadow: 0 0 12px #9900cc; }
  </style>
</head>
<body>
  <div id="tela-inicio">
    <div class="grade-fundo"></div>
    <div class="grade-chao"></div>
    <div class="estrelas" id="estrelas"></div>

    <div class="montanhas">
      <svg viewBox="0 0 1440 80" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <polygon points="0,80 60,40 120,80 200,20 280,80 380,30 460,80 560,18 640,80 740,35 820,80 920,15 1000,80 1100,28 1200,80 1320,22 1440,80" fill="#0d0025"/>
      </svg>
    </div>

    <div class="cidade" id="cidade"></div>
    <div class="setas-container" id="setas-container"></div>

    <div class="tela-neon">
      <div class="titulo">
        <span class="titulo-linha1">RHYTHM</span>
        <span class="titulo-linha2">GROOVE</span>
      </div>

      <nav class="menu" id="menu-principal">
        <div class="menu-item" onclick="abrirSongs()">START GAME</div>
      </nav>
    </div>
  </div>

  <div id="tela-songs">
    <div class="songs-titulo">SELECT SONG</div>

    <div class="musicas-lista" id="lista-musicas"></div>
    <button class="btn-voltar" onclick="voltarInicio()">◀ BACK</button>
  </div>

  <script>
    const containerEstrelas = document.getElementById('estrelas');
    for (let i = 0; i < 80; i++) {
      const s = document.createElement('div');
      s.className = 'estrela';
      s.style.left = Math.random() * 100 + '%';
      s.style.top = Math.random() * 70 + '%';
      s.style.width = s.style.height = (Math.random() * 2 + 1) + 'px';
      s.style.animationDuration = (Math.random() * 3 + 1.5) + 's';
      s.style.animationDelay = (-Math.random() * 4) + 's';
      containerEstrelas.appendChild(s);
    }

    const larguras = [10,14,16,12,18,11,15,13,17,10,16,12,14,11,18,15,13,10,16,12,14,11,18,15,13,10,16,12];
    const alturas = [60,90,75,110,55,95,80,70,100,65,85,72,115,58,92,78,68,102,63,88,74,112,56,94,82,66,98,76];
    const containerCidade = document.getElementById('cidade');
    larguras.forEach((w, i) => {
      const p = document.createElement('div');
      p.className = 'predio';
      p.style.width = w + 'px';
      p.style.height = alturas[i] + 'px';
      containerCidade.appendChild(p);
    });

    const setasInfo = [
      { char: '▲', cor: '#44ddcc' },
      { char: '▶', cor: '#ff44aa' },
      { char: '▼', cor: '#4488ff' },
      { char: '◀', cor: '#ffff44' },
    ];
    const containerSetas = document.getElementById('setas-container');
    for (let i = 0; i < 30; i++) {
      const seta = setasInfo[i % 4];
      const el = document.createElement('div');
      el.className = 'seta-caindo';
      el.textContent = seta.char;
      el.style.color = seta.cor;
      el.style.left = (Math.random() * 100) + '%';
      el.style.fontSize = (20 + Math.random() * 20) + 'px';
      el.style.opacity = (0.08 + Math.random() * 0.15);
      const dur = 4 + Math.random() * 7;
      el.style.animationDuration = dur + 's';
      el.style.animationDelay = (-Math.random() * dur) + 's';
      containerSetas.appendChild(el);
    }

    const MUSICAS = [
      { nome: 'MACARENA' },
      { nome: 'RAGATANGA' },
    ];

    const SETAS_CARD = [
      { char: '▲', classe: 'cima' },
      { char: '▶', classe: 'dir' },
      { char: '▼', classe: 'baixo' },
      { char: '◀', classe: 'esq' },
    ];

    let cardSelecionado = -1;

    function abrirSongs() {
      document.getElementById('tela-inicio').style.display = 'none';
      document.getElementById('tela-songs').classList.add('ativa');
      renderMusicas();
    }

    function voltarInicio() {
      document.getElementById('tela-songs').classList.remove('ativa');
      document.getElementById('tela-inicio').style.display = 'flex';
    }

    function renderMusicas() {
      const lista = document.getElementById('lista-musicas');
      lista.innerHTML = '';
      MUSICAS.forEach((m, i) => {
        const seta = SETAS_CARD[i % 4];
        const card = document.createElement('div');
        card.className = 'musica-card' + (cardSelecionado === i ? ' selecionada' : '');
        card.innerHTML = `
          <div class="musica-linha1">
            <span class="musica-seta ${seta.classe}">${seta.char}</span>
            <span class="musica-nome">${m.nome}</span>
            <button class="btn-play" onclick="tocarMusica(${i}, event)">▶ PLAY</button>
            <span class="coracao">♥</span>
          </div>`;
        card.addEventListener('click', () => { cardSelecionado = i; renderMusicas(); });
        lista.appendChild(card);
      });
    }

    function tocarMusica(i, e) {
      e.stopPropagation();
      cardSelecionado = i;
      renderMusicas();
    }
  </script>
</body>
</html>
